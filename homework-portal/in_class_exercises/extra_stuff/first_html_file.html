<!DOCTYPE HTML> <!--tells the browser this is an html type document -->
<html>
    <head> <!-- this is a tag -->
        <!-- Anything in the head is NOT visible on the page -->

        <title>Gerbils Are Cool</title>
        <!-- this is a content item that needs to be in the head -->

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Rubik+Storm&display=swap');
            @import url('https://fonts.googleapis.com/css2?family=Mogra&family=Rubik+Storm&display=swap');
            /* this is a CSS comment */
            body {
                background-color: #b54f00;
            }
            h1 {
                color: #ff008c;
                font-family: "Rubik Storm", system-ui;
            }
            bob{
                color:rgb(0, 251, 180);
                font-family: "Mogra", system-ui;;
                font-size: 20ch;
            }
            p {
                font-family: fantasy;
                color:rgb(238, 255, 0)
            }
        </style>
        <!-- hex colors #ff 00 ff < first set is red, second g, third blue. -->
         <!-- decimal rgb(255,0,255) these are equivalent #ff00ff -->

    </head> <!-- this closses the tag -->
    <body> 
        <!-- anything in the body IS visible on the page -->
         <!-- <h1> is for header 1 -->
         <h1>Why gerbils are neato</h1>

         <!-- <p> is for paragraphs -->
         <p>They are desert animals. They have hair
            on their tails, which is less creepy than
            rats (sorry if you like rats). Also, They are cute! We
            like cute stuff.
         </p>
         <bob> <strong>this is the bob tag</strong></bob>

    </body>
</html>
