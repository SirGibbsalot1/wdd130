<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            display: grid;
            justify-content: center;
        }

        #formContainer {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: .4fr 1fr .2fr;
            border: solid #0066ff 5px;
            background-color: white;
            border-radius: 15px;
            width: 400px;
            height: 500px;
            justify-items: center;
        }

        /* #jesus-img {
            width: 100%;
            height: 100%;
            grid-row: 1;
        } */
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-row: 2;

        }
        #form-title {
            width: 100%;
            justify-items: center;
            grid-row: 1;
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
        }
        #closeBtn {
            position: absolute;
            top: 15px;
        }

        #scripture-imgs {
            display: flex;
            max-width: 400px;
            height: 107px;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div id="form-title">
            <h3>Daily Feed</h3>
            <h3>Scripture a Day</h3>
        </div>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="scripture-imgs">
            <img id="old-testament" src="images/old_testament.webp">
            <img id="new-testament" src="images/new_testament.webp">
            <img id="BoM" src="images/book_of_mormon.webp">
            <img id="DnC" src="images/doctrine_and_covenants.webp">
            <img id="pearl-of-great-price" src="images\pearl_of_great_price.webp">
        </div>
        
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
