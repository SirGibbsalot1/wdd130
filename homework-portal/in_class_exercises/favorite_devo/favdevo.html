<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">

        <!-- Add your devotional content here -->
         Add your table and your form here.
        <table>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
            <tr>
              <td>Elder Anderson</td>
              <td>Clever Title</td>
              <td>Comference Center</td>
              <td>1999</td>
            </tr>
            <tr>
              <td>President Meredith</td>
              <td>Go To Date Night</td>
              <td>BYU-I Center</td>
              <td>2026</td>
            </tr>
            <tr>
              <td>Bro Warner</td>
              <td>Hot Air Baloon Cafe</td>
              <td>STC 347</td>
              <td>2026</td>
            </tr>
        </table>

        <p>Enter your favorite devotional</p>

        <form>
          <label for="speaker">Speaker</label><br>
          <input type="text" id="speaker" name="speaker"
          value="Enter speaker name"><br>

          <label for="title">Title</label><br>
          <input type="text" id="title" name="title"
          value="Enter the title"><br>

          <label for="location">Location</label><br>
          <input type="text" id="location" name="location"
          value="Enter location"><br>

          <label for="year">Year</label><br>
          <input type="text" id="year" name="year"
          value="Enter year"><br>
        </form>

      </div>
    </main>
  </div>
</body>
</html>
