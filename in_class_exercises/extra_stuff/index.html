<!DOCTYPE html> 
<!-- ! and ENTER is a hotkey for making the bones -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Portal</title>
    <style>
        h1 {
            text-align: center;
            margin-top: 0;

        }
        h2 {
            color: rgb(116, 28, 28);
            padding-left: 0px;
        }

        #in-class-exercise-heading {
            color: rgb(116, 28, 28);
            padding-left: 0px;

        }
        /* class selectors start with a period . */
        .header-text{
            color:rgb(0, 0, 0);
            /* Different fonts support different weights */
            font-weight: 800;
            background-color: rgb(134, 83, 1);
        }

        ul{
            margin: 0px 0px 0px 0;
            padding-left: 20px;
        }

        body {
            margin: 0;
            background-color: blanchedalmond;
        }
        .card {
            margin: 10% 10% 10% 10%;
            background-color:#e08a005e;
            border-style: solid;
            /* curve of border */
            border-radius: 10px;
            box-shadow: 5px 10px #000000cb;
        }

        #card-container{
            /* this is the grid tool for layout */
            display:grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: .65fr 2fr;
            justify-content: center;
        }
        header {
            grid-column-start: 1;
            grid-column-end: 3;
        }
    
        nav {
            /* This is the flex tool for layout */
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* descendency selector */
        nav a {
            color:black;
        }
        nav a:hover {
            color: rgb(0, 55, 255);
        }

    </style>
</head>
<body>

<div id="card-container"> 
    <header>
    <h1 class="header-text">Gabe Edstrom WDD130 Homework</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Homework</a>
        <a href="#">Contact Us</a>
        <a href="#">About Me</a>

    </nav>
    </header>

    <div class="card">
        <h2 id="in-class-exercise-heading">In-Class Exercises</h2>
        <ul>
            <li>
                <!-- Attributes go inside tags i.e. <a href=""    the text here is what the user sees-->
                <a href="in_class_exercises\first_html_file.html">Week 1: HTML basics</a>
            </li>
        </ul>
    </div>
    <!-- div groups elements so they're easier to style in CSS -->
    <div class="card">
        <h2 id="white_water_rafting_heading">White Water Rafting</h2>
        <ul>
            <li>
                <a href="white_water_rafting\index.html">My White Water Rafting website</a>
            </li>  
        </ul>
        <ul>
            <li>
                <a href="white_water_rafting\site-plan-rafting.html">The site plan</a>
            </li>    
        </ul>
    </div>
</div> 

</body>
</html>
